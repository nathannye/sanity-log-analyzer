<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>🔌 Report Preview</title>
    <link
      rel="icon"
      href="https://raw.githubusercontent.com/nathannye/sanity-log-analyzer/main/favicon.png"
      type="image/png"
    />
    <script>
      try {
        if (localStorage.getItem("sanity-log-parser-theme") === "light") {
          document.documentElement.setAttribute("data-theme", "light");
        }
      } catch (e) {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono&family=Geist:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
